<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Type It Out — Typing Speed Trainer</title>
  <link rel="stylesheet" href="/main.css">
</head>
<body>
  <nav>
    <div class="masterContentBox">
      <a href="/" id="logoTxt">
        <span id="startingLetterLogo">T</span>
        <span>ype It Out</span>
      </a>

      <div id="wordCountSelector">
        <button class="wc-btn" data-count="10">10</button>
        <button class="wc-btn" data-count="25">25</button>
        <button class="wc-btn active" data-count="50">50</button>
        <button class="wc-btn" data-count="100">100</button>
      </div>

      <button id="themeToggle" class="wc-btn" title="Toggle light/dark mode">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="4"></circle>
          <path d="M12 2v2"></path>
          <path d="M12 20v2"></path>
          <path d="M4.93 4.93l1.41 1.41"></path>
          <path d="M17.66 17.66l1.41 1.41"></path>
          <path d="M2 12h2"></path>
          <path d="M20 12h2"></path>
          <path d="M6.34 17.66l-1.41 1.41"></path>
          <path d="M19.07 4.93l-1.41 1.41"></path>
        </svg>
      </button>
    </div>
  </nav>

  <div class="masterContentBox">
    <div id="typingPlace">
      <div id="typeText"></div>
      <input type="text" id="typeTextBox" autofocus placeholder="Start typing..." autocomplete="off">
      <div id="keyboardHints" class="keyboard-hints">
        <span class="hint"><kbd>Esc</kbd> Restart</span>
        <span class="hint"><kbd>Tab</kbd> Focus</span>
        <span class="hint"><kbd>R</kbd> Reset</span>
      </div>
    </div>

    <div id="charList"></div>

    <div id="results">
      <div class="resultBox">
        <h3>Word Statistics</h3>
        <div class="statisticDiv">
          <span class="statisticLabel">Speed (WPM)</span>
          <span class="statistic" id="wordSpeed">0</span>
        </div>
        <div class="statisticDiv">
          <span class="statisticLabel">Accuracy</span>
          <span class="statistic" id="wordAccuracy">0%</span>
        </div>
        <div class="statisticDiv">
          <span class="statisticLabel">Correct</span>
          <span class="statistic" id="correctWords">0</span>
        </div>
        <div class="statisticDiv">
          <span class="statisticLabel">Wrong</span>
          <span class="statistic" id="wrongWords">0</span>
        </div>
      </div>
      <div class="resultBox">
        <h3>Character Stats — <span id="charName">A</span></h3>
        <div class="statisticDiv">
          <span class="statisticLabel">Speed (CPM)</span>
          <span class="statistic" id="charSpeed">0</span>
        </div>
        <div class="statisticDiv">
          <span class="statisticLabel">Accuracy</span>
          <span class="statistic" id="charAccuracy">0%</span>
        </div>
        <div class="statisticDiv">
          <span class="statisticLabel">Correct</span>
          <span class="statistic" id="correctChars">0</span>
        </div>
        <div class="statisticDiv">
          <span class="statisticLabel">Wrong</span>
          <span class="statistic" id="wrongChars">0</span>
        </div>
      </div>

    </div>
  </div>

  <div id="toast"></div>

  <script type="module" src="/src/main.ts"></script>
</body>
</html>
